<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>財務分析與股價預測系統 — 儀表板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="topbar">
  <h1>各公司各季度財務分析與股價預測系統</h1>
  <span class="disclaimer">僅供分析參考，不構成投資建議</span>
  <div class="apikey-form" id="auth-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="auth-username" hidden></span>
    <button id="login-btn" class="primary">登入</button>
    <button id="logout-btn" hidden>登出</button>
  </div>
</div>

<div class="filters">
  <label for="company-select">公司</label>
  <select id="company-select">
    <option value="">— 載入中 —</option>
  </select>
  <label for="market-select" style="margin-left:8px;">市場</label>
  <select id="market-select">
    <option value="">全部</option>
    <option value="TW">台股</option>
    <option value="US">美股</option>
  </select>
  <button id="add-company-btn" style="margin-left:8px;">＋ 新增公司</button>
</div>

<div class="modal-overlay" id="add-company-overlay" hidden>
  <div class="modal">
    <h2>新增追蹤公司</h2>
    <div id="add-company-msg"></div>
    <form id="add-company-form">
      <div class="field">
        <label>市場</label>
        <div class="radio-row">
          <label><input type="radio" name="market" value="TW" checked> 台股</label>
          <label><input type="radio" name="market" value="US"> 美股</label>
        </div>
      </div>
      <div class="field search-field">
        <label for="add-ticker">股票代號 / Ticker</label>
        <input type="text" id="add-ticker" required autocomplete="off">
      </div>
      <div class="field search-field">
        <label for="add-name">公司名稱（輸入代碼或名稱皆可搜尋，擇一填寫即可）</label>
        <input type="text" id="add-name" required autocomplete="off">
        <div class="search-results" id="add-search-results" hidden></div>
        <div class="field-hint">搜尋比對的是正式登記名稱，若輸入常用簡稱查無結果，可直接手動填寫代碼與名稱。</div>
      </div>
      <div class="field">
        <label for="add-industry">產業（可選）</label>
        <input type="text" id="add-industry" autocomplete="off">
      </div>
      <div class="field" id="add-cik-field" hidden>
        <label for="add-cik">CIK（留空將自動查詢，查無結果才需手動填寫）</label>
        <input type="text" id="add-cik" autocomplete="off">
      </div>
      <div class="actions">
        <button type="button" id="add-company-cancel">取消</button>
        <button type="submit" class="primary" id="add-company-submit">新增</button>
      </div>
    </form>
  </div>
</div>

<main id="main-content">
  <div class="empty-state" id="global-empty">載入中…</div>
</main>

<footer>各公司各季度財務分析與股價預測系統 · 內部分析儀表板</footer>

<div class="tooltip" id="tooltip"></div>

<script src="/static/dashboard.js"></script>
</body>
</html>
