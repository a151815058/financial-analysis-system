<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排程執行狀況 — 管理後台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
<link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="topbar">
  <h1>排程執行狀況</h1>
  <span class="disclaimer">/admin 後台</span>
  <div class="apikey-form" id="user-bar" hidden>
    <span class="status-dot ok"></span>
    <span id="username-label"></span>
    <button id="change-password-btn">變更密碼</button>
    <button id="logout-btn">登出</button>
    <button id="refresh-btn" class="primary">重新整理</button>
  </div>
</div>

<main id="main-content">
  <div class="login-wrap" id="login-wrap">
    <div class="card login-card">
      <h2>登入後台</h2>
      <div id="login-msg"></div>
      <form id="login-form">
        <div class="field">
          <label for="login-username">帳號</label>
          <input type="text" id="login-username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="login-password">密碼</label>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="primary" id="login-submit">登入</button>
      </form>
    </div>
  </div>
</main>

<div class="modal-overlay" id="change-password-overlay" hidden>
  <div class="modal">
    <h2>變更密碼</h2>
    <div id="change-password-msg"></div>
    <form id="change-password-form">
      <div class="field">
        <label for="cp-current">現有密碼</label>
        <input type="password" id="cp-current" autocomplete="current-password" required>
      </div>
      <div class="field">
        <label for="cp-new">新密碼（至少 8 碼）</label>
        <input type="password" id="cp-new" autocomplete="new-password" required minlength="8">
      </div>
      <div class="field">
        <label for="cp-confirm">確認新密碼</label>
        <input type="password" id="cp-confirm" autocomplete="new-password" required minlength="8">
      </div>
      <div class="actions">
        <button type="button" id="change-password-cancel">取消</button>
        <button type="submit" class="primary" id="change-password-submit">送出</button>
      </div>
    </form>
  </div>
</div>

<footer>各公司各季度財務分析與股價預測系統 · 排程管理後台（<a href="/dashboard">回財務儀表板</a>）</footer>

<script src="/static/admin.js"></script>
</body>
</html>
