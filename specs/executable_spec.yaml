# =============================================================================
# 可執行規格母版 (Executable Specification - SSOT)
# =============================================================================
# 專案：各公司各季度財務分析與股價預測系統
# 本檔案為專案唯一資料源（Single Source of Truth）
# =============================================================================

project:
  name: "各公司各季度財務分析與股價預測系統"
  version: "0.3.0"
  created: "2026-07-14"
  last_updated: "2026-07-14T02:00:00"
  current_phase: "03_implementation_and_coding"
  description: "彙整台股與美股各公司季度財務資料，計算 7 項核心財務指標，結合財報因子統計模型與股價時間序列模型，產出每週漲跌方向與幅度區間預測，並提供查詢 API。"

security_baseline:
  enabled: true
  level: "medium"
  domains: [1, 2, 3, 4, 5, 6, 7]

phase_01_planning:
  status: completed
  baseline: "baseline/phase-01/baseline-v1/"
  inputs:
    raw_requirements: ["01_planning_and_analysis/inputs/user_requirement_raw.md"]
  outputs:
    formal_requirements: "01_planning_and_analysis/outputs/formal_requirements.md"
    security_requirements: "01_planning_and_analysis/outputs/security_requirements.md"
    requirement_tracker: "01_planning_and_analysis/reg/requirement_tracker.md"
  requirements:
    - id: "REQ_001"
      description: "台股財務資料擷取（MOPS）"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "可指定股票代號清單，批次擷取最近 N 季財報"
        - "擷取失敗需記錄錯誤並可重試，不可中斷整批任務"
        - "每季財報公布後 24 小時內完成擷取更新"
    - id: "REQ_002"
      description: "美股財務資料擷取（SEC EDGAR + 市場資料 API）"
      priority: P0
      source: "使用者口述 + 缺口拷問 2026-07-14"
      acceptance_criteria:
        - "可指定美股 Ticker 清單，批次擷取最近 N 季申報資料"
        - "SEC EDGAR XBRL 申報格式需正確解析至統一財務指標欄位"
        - "市場資料 API 供應商需可替換，不得寫死單一供應商"
    - id: "REQ_003"
      description: "跨市場財務指標正規化與儲存"
      priority: P0
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "統一標註幣別（TWD/USD）"
        - "7 項核心指標缺漏需明確標記"
        - "財報更正時保留歷史版本並標記最新版"
    - id: "REQ_004"
      description: "財報因子統計模型（漲跌方向 + 幅度區間）"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "輸入含至少 7 項核心財務指標之衍生特徵"
        - "輸出格式為 {方向, 幅度區間, 信心分數}"
        - "訓練與推論流程可重現"
    - id: "REQ_005"
      description: "股價時間序列模型"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "至少支援一種時間序列方法"
        - "可處理股價資料缺漏"
        - "輸出格式與 REQ_004 相容"
    - id: "REQ_006"
      description: "雙模型融合（Ensemble）與預測結果產出"
      priority: P0
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "融合邏輯可設定權重或切換策略"
        - "最終輸出保留兩子模型個別結果"
    - id: "REQ_007"
      description: "預測結果查詢 API"
      priority: P0
      source: "缺口拷問 2026-07-14"
      acceptance_criteria:
        - "提供財務指標歷史查詢端點"
        - "提供最新一週預測結果查詢端點"
        - "API 需具備身分驗證"
    - id: "REQ_008"
      description: "資料擷取與模型更新排程機制"
      priority: P1
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "排程失敗需記錄通知"
        - "排程任務可手動觸發重跑"
    - id: "REQ_009"
      description: "預測準確率回測與追蹤報告"
      priority: P1
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "提供方向準確率與幅度區間命中率統計"
        - "至少涵蓋近 12 週滾動視窗"
    - id: "REQ_SEC_001"
      description: "🔒 API 存取控制與身份驗證（安全需求，構面 1/4）"
      priority: P0
      source: "資安基準（中級）2026-07-14"
      acceptance_criteria:
        - "所有查詢 API 須驗證權杖/金鑰"
        - "未授權存取應回傳明確拒絕回應"
  open_issues:
    - id: "OI-001"
      description: "市場資料 API 供應商尚未選定，需於 Phase 02 確認費用與速率限制"
    - id: "OI-002"
      description: "美股原文英文財報欄位對應細節，需於 Phase 02 資料模型設計時處理"
    - id: "OI-003"
      description: "預測幅度區間粒度尚未定案，將於 Phase 03 建模時確認"
  evaluator:
    passed: true
    scores: { coverage: 95, clarity: 92, traceability: 95, format: 95, security_coverage: 90 }
    errors: { type_a: [], type_b: [] }

phase_02_design:
  status: completed
  baseline: "baseline/phase-02/baseline-v1/"
  database:
    schema_file: "02_system_design/outputs/db_schema.sql"
    er_diagram: "02_system_design/outputs/er_diagram.md"
    tables: ["companies", "financial_reports", "price_history", "predictions", "prediction_backtests", "api_keys", "audit_logs"]
  api:
    spec_file: "02_system_design/outputs/api_spec.md"
    auth: "API Key (X-API-Key header), scopes: read/admin"
    endpoints:
      - "GET /api/v1/companies"
      - "GET /api/v1/companies/{ticker}/financials"
      - "GET /api/v1/companies/{ticker}/prices"
      - "GET /api/v1/companies/{ticker}/predictions/latest"
      - "GET /api/v1/companies/{ticker}/predictions/history"
      - "GET /api/v1/companies/{ticker}/backtest"
      - "POST /api/v1/admin/ingest/trigger"
  uml:
    usecase_diagram: "02_system_design/outputs/usecase_diagram.md"
    activity_diagram: "02_system_design/outputs/activity_diagram.md"
    sequence_diagram: "02_system_design/outputs/sequence_diagram.md"
  ui_prototype_required: false
  ui_prototype_reason: "使用者確認系統定位為後端分析服務 + API，不含網頁儀表板"
  market_data_api_vendor: "Alpha Vantage"
  open_issues_resolved:
    - id: "OI-001"
      resolution: "美股股價/市場資料採用 Alpha Vantage"
  open_issues_carried_forward:
    - id: "OI-002"
      note: "美股 XBRL 財報欄位對應細節，將於 Phase 03 實作時以欄位對應白名單處理"
    - id: "OI-003"
      note: "預測幅度區間粒度，將於 Phase 03 建模時確認"
  evaluator:
    passed: true
    scores: { coverage: 96, clarity: 93, traceability: 94, format: 95, security_coverage: 92 }
    errors: { type_a: [], type_b: [] }

