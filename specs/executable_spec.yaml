project:
  name: "各公司各季度財務分析與股價預測系統"
  version: "0.7.0"
  created: "2026-07-14"
  last_updated: "2026-07-14T05:15:00"
  current_phase: "06_maintenance"
  description: "彙整台股與美股各公司季度財務資料，計算 7 項核心財務指標，結合財報因子統計模型與股價時間序列模型，產出每週漲跌方向與幅度區間預測，並提供查詢 API 與內部分析儀表板。"

# REQ_010：內部分析儀表板（Phase 05 之後、Phase 06 之前追加，使用者要求之範疇外輕量新增）
feature_010_dashboard:
  status: completed
  baseline: null # 未走完整 Phase PDCA，未建立獨立 Baseline，詳見 memory.md 與 traceability_matrix.md
  route: "/dashboard"
  static_assets: ["app/static/dashboard.html", "app/static/dashboard.css", "app/static/dashboard.js"]
  tests: "03_implementation_and_coding/outputs/tests/test_dashboard.py（3 項）"
  verification: "Chrome headless + Puppeteer 實際驅動，截圖確認 light/dark mode、錯誤狀態、tooltip 互動；dataviz skill validate_palette.js 驗證色板通過"
  total_tests_after_addition: 52

security_baseline:
  enabled: true
  level: "medium"
  domains: [1, 2, 3, 4, 5, 6, 7]

phase_01_planning:
  status: completed
  baseline: "baseline/phase-01/baseline-v1/"
  inputs:
    raw_requirements: ["01_planning_and_analysis/inputs/user_requirement_raw.md"]
  outputs:
    formal_requirements: "01_planning_and_analysis/outputs/formal_requirements.md"
    security_requirements: "01_planning_and_analysis/outputs/security_requirements.md"
    requirement_tracker: "01_planning_and_analysis/reg/requirement_tracker.md"
  requirements:
    - id: "REQ_001"
      description: "台股財務資料擷取（MOPS）"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "可指定股票代號清單，批次擷取最近 N 季財報"
        - "擷取失敗需記錄錯誤並可重試，不可中斷整批任務"
        - "每季財報公布後 24 小時內完成擷取更新"
    - id: "REQ_002"
      description: "美股財務資料擷取（SEC EDGAR + 市場資料 API）"
      priority: P0
      source: "使用者口述 + 缺口拷問 2026-07-14"
      acceptance_criteria:
        - "可指定美股 Ticker 清單，批次擷取最近 N 季申報資料"
        - "SEC EDGAR XBRL 申報格式需正確解析至統一財務指標欄位"
        - "市場資料 API 供應商需可替換，不得寫死單一供應商"
    - id: "REQ_003"
      description: "跨市場財務指標正規化與儲存"
      priority: P0
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "統一標註幣別（TWD/USD）"
        - "7 項核心指標缺漏需明確標記"
        - "財報更正時保留歷史版本並標記最新版"
    - id: "REQ_004"
      description: "財報因子統計模型（漲跌方向 + 幅度區間）"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "輸入含至少 7 項核心財務指標之衍生特徵"
        - "輸出格式為 {方向, 幅度區間, 信心分數}"
        - "訓練與推論流程可重現"
    - id: "REQ_005"
      description: "股價時間序列模型"
      priority: P0
      source: "使用者口述 2026-07-14"
      acceptance_criteria:
        - "至少支援一種時間序列方法"
        - "可處理股價資料缺漏"
        - "輸出格式與 REQ_004 相容"
    - id: "REQ_006"
      description: "雙模型融合（Ensemble）與預測結果產出"
      priority: P0
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "融合邏輯可設定權重或切換策略"
        - "最終輸出保留兩子模型個別結果"
    - id: "REQ_007"
      description: "預測結果查詢 API"
      priority: P0
      source: "缺口拷問 2026-07-14"
      acceptance_criteria:
        - "提供財務指標歷史查詢端點"
        - "提供最新一週預測結果查詢端點"
        - "API 需具備身分驗證"
    - id: "REQ_008"
      description: "資料擷取與模型更新排程機制"
      priority: P1
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "排程失敗需記錄通知"
        - "排程任務可手動觸發重跑"
    - id: "REQ_009"
      description: "預測準確率回測與追蹤報告"
      priority: P1
      source: "Planner 需求分析 2026-07-14"
      acceptance_criteria:
        - "提供方向準確率與幅度區間命中率統計"
        - "至少涵蓋近 12 週滾動視窗"
    - id: "REQ_SEC_001"
      description: "🔒 API 存取控制與身份驗證（安全需求，構面 1/4）"
      priority: P0
      source: "資安基準（中級）2026-07-14"
      acceptance_criteria:
        - "所有查詢 API 須驗證權杖/金鑰"
        - "未授權存取應回傳明確拒絕回應"
  open_issues:
    - id: "OI-001"
      description: "市場資料 API 供應商尚未選定，需於 Phase 02 確認費用與速率限制"
    - id: "OI-002"
      description: "美股原文英文財報欄位對應細節，需於 Phase 02 資料模型設計時處理"
    - id: "OI-003"
      description: "預測幅度區間粒度尚未定案，將於 Phase 03 建模時確認"
  evaluator:
    passed: true
    scores: { coverage: 95, clarity: 92, traceability: 95, format: 95, security_coverage: 90 }
    errors: { type_a: [], type_b: [] }

