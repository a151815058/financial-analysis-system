# Phase 05 IO 檔案合約（@io set 產生）
phase: 05_deployment
inputs:
  - file: test_results.md
    required: true
    from_phase: 04_testing
    description: 測試結果報告（須全數通過方可部署）
outputs:
  - file: build_manifest.json
    required: true
    description: 建置產物清單（含 SHA-256 雜湊值）
  - file: deployment_topology.md
    required: true
    description: 部署拓樸、服務依賴順序與回滾方案
  - file: Dockerfile
    required: true
    description: 應用程式容器化建置定義
  - file: docker-compose.yml
    required: true
    description: 多服務（app/db/nginx）編排與依賴宣告
  - file: nginx/nginx.conf
    required: true
    description: 反向代理與 HTTP 安全標頭設定
  - file: signature_status.json
    required: true
    description: 建置產物簽章/完整性驗證狀態
  - file: sbom.json
    required: true
    description: "🔒 軟體物料清單 SBOM"
  - file: .env.example
    required: true
    description: "🔒 環境變數範本（不含真實密鑰）"
  - file: security_deployment_checklist.md
    required: true
    description: "🔒 部署安全檢核清單"
