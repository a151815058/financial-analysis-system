# nginx 反向代理設定
# ⚠️ 未經 `nginx -t` 實際驗證（本機環境未安裝 nginx），見 deployment_topology.md「驗證限制」
#
# 本設定回應 Phase 04 DAST 報告（04_testing/outputs/dast_report.md）指出的兩項改善建議：
#   1. 補上缺少的 HTTP 安全標頭
#   2. 隱藏 Server 標頭（避免洩漏 uvicorn 版本資訊）

server {
    listen 80;
    server_name _;
    # 🔒 構面 6：全站導向 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # 🔒 TLS 憑證（占位路徑，正式憑證需另行配置，見 security_deployment_checklist.md）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 隱藏後端框架版本資訊（回應 DAST 發現：Server 標頭洩漏 uvicorn）
    # 注意：server_tokens off 僅隱藏 nginx 版本號，不會移除 "Server: nginx" 字樣本身；
    # 若需完全移除/自訂 Server 標頭，需改用內建 headers-more-nginx-module 之映像檔
    # （如 openresty/openresty 或自行編譯），標準 nginx:alpine 映像檔未內建該模組，
    # 此為已知限制，非本階段可修復（見 deployment_topology.md「驗證限制」）
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # 🔒 補上 Phase 04 DAST 發現缺少的安全標頭
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://app:8000/health;
        access_log off;
    }
}
