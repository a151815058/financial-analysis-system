# ⚠️ 本機環境未安裝 Docker，本檔案未經 `docker compose config` / `docker compose up` 實際驗證
# 執行方式（於具備 Docker 的環境）：
#   cd 05_deployment/outputs
#   docker compose --env-file .env up -d --build
#
# build context 為專案根目錄（financial-analysis-system/），對應 Dockerfile 內 COPY 路徑

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請於 .env 設定 POSTGRES_PASSWORD，禁止使用預設值}
    volumes:
      - db_data:/var/lib/postgresql/data
      # 首次啟動自動建表（僅第一次初始化資料庫時執行）
      - ../../02_system_design/outputs/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-financial_analysis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: ../..
      dockerfile: 05_deployment/outputs/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-financial_analysis}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:?請於 .env 設定 ALPHA_VANTAGE_API_KEY}
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT:-financial-analysis-system deploy@example.com}
      MIN_SECURITY_SCORE_PCT: "70"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 🔒 正式 TLS 憑證掛載點（本階段僅提供占位設定，實際憑證由 Phase 05 後續操作或憑證管理服務提供）
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  db_data:
